<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <div class="heading">
        <p>Weather App</p>
    </div>

    <div class="weather-container">

        <div class="top-bar">
            <h3 id="location">Loading...</h3>
            
            <div class="top-right-actions">
                <div class="search-wrapper">
                    <div class="search-box">
                        <input id="cityInput" type="text" placeholder="Search city..." autocomplete="off">
                    </div>
                    <button class="search-btn" onclick="searchCity()">🔍</button>
                </div>
                
               <div class="profile-section" onclick="toggleSidebar()">
                    <div class="profile-avatar">
                        <img id="userAvatar" src="j.jpg">
                    </div>
                 
                </div>
            </div>
        </div>

        <div class="hero-card">
            <div class="weather-info">
                <div class="icon" id="main-icon">☀️</div>
                <h2 id="temp">--°</h2>
                <p id="locationText">Loading...</p>
            </div>
            <div class="sunset">
                <p id="wind">-- km/h</p>
                <span>Wind Speed</span>
            </div>
        </div>

        <div class="bottom-section">
            <div class="left-cards">
                <div class="small-card">
                    <h4>Humidity</h4>
                    <p id="humidity">--%</p>
                </div>
                <div class="small-card">
                    <h4>Sunset</h4>
                    <p id="sunset-time">--:--</p>
                </div>
                <div class="small-card">
                    <h4>UV Index</h4>
                    <p id="uv-index">--</p>
                </div>
                <div class="small-card">
                    <h4>Sunrise</h4>
                    <p id="sunrise-time">--:--</p>
                </div>
                <div class="rain-card">
                    <div>
                        <h4>Max Rain Chance</h4>
                        <p id="rain-chance">--%</p>
                    </div>
                    <div>
                        <h4>This Year</h4>
                        <p>+10%</p>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <h4>Temperature Trends & Forecast</h4>
                <div class="chart-container">
                    <canvas id="forecastChart"></canvas>
                </div>
                
                <div class="chart-forecast-footer" id="chartForecastFooter"></div>
            </div>
        </div>

    </div>

    <div id="sideMenu" class="sidebar">
        <div class="sidebar-header">
            <h3>Account Settings</h3>
            <span class="close-btn" onclick="toggleSidebar()">×</span>
        </div>
        <ul class="sidebar-options">
            <li onclick="alert('Change profile picture clicked!')">📸 Change Profile Pic</li>
            <li onclick="changeName()">✏️ Change Name</li>
        </ul>
    </div>

    <script src="Func2.js"></script>

</body>
</html>
